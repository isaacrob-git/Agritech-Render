<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CosechaDirecta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand_lime: '#D1F09B',
                        navy_dark: '#102A32',
                        navy_deep: '#0A1F26',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #102A32, #0A1F26);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #D1F09B;
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

<script>
    if (localStorage.getItem("token")) {
        window.location.href = "main-user.html";
    }
</script>

<div class="w-full max-w-[450px]">
    <a href="index.html" class="text-white/50 hover:text-brand_lime transition mb-8 inline-block flex items-center gap-2 text-sm">
        Volver a la página principal
    </a>

    <div class="glass-card rounded-[32px] p-8 md:p-10 shadow-2xl border border-white/10">
        <div class="flex items-center gap-2 mb-8 justify-center">
            <span class="text-white font-bold text-xl tracking-tighter">Cosecha<span class="text-brand_lime font-light">Directa</span></span>
        </div>

        <h2 class="text-white text-2xl font-bold mb-2">Bienvenido de nuevo</h2>
        <p class="text-white/60 mb-8 text-sm">Ingresa tus credenciales para acceder.</p>

        <form id="formLogin" class="space-y-5">
            <div>
                <label class="text-white/80 text-xs font-semibold uppercase tracking-wider mb-2 block">Correo Electrónico</label>
                <input type="email" name="email" class="input-field w-full p-4 rounded-xl text-white text-sm" required>
            </div>
            <div>
    <label class="text-white/80 text-xs font-semibold uppercase tracking-wider mb-2 block">Contraseña</label>
    <div class="relative">
        <input type="password" name="password" id="password" class="input-field w-full p-4 rounded-xl text-white text-sm pr-12" required>
        
        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-brand_lime transition-colors">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                <path id="eyePath" stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
        </button>
    </div>
</div>
            <button type="submit" class="w-full bg-brand_lime text-navy_dark font-bold py-4 rounded-xl hover:scale-[1.02] transition-transform active:scale-95 shadow-lg shadow-brand_lime/10">
                Entrar
            </button>
        </form>

        <p class="text-white/60 mt-8 text-center text-sm">
            ¿No tienes cuenta? 
            <a href="register.html" class="text-brand_lime font-bold hover:underline">Regístrate aquí</a>
        </p>
    </div>
</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/login.js"></script>

</body>
</html>
