<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Agricultor | CosechaDirecta</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    brand_lime: '#D1F09B',
                    brand_lime_dark: '#B8E07D',
                    navy_dark: '#102A32',
                    navy_deep: '#0A1F26',
                    danger: '#EF4444'
                },
                fontFamily: { sans: ['Inter', 'sans-serif'] }
            }
        }
    }
</script>
<style>
    body { background-color: #F8FAFC; font-family: 'Inter', sans-serif; }
    .glass-sidebar { background: rgba(16, 42, 50, 0.98); backdrop-filter: blur(10px); }
    .custom-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
    
    /* Scrollbar minimalista */
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
</style>
</head>

<body class="text-navy_dark flex min-h-screen">

<aside class="w-72 glass-sidebar text-white p-6 flex flex-col justify-between fixed h-full z-40">
    <div>
        <div class="mb-10 px-2">
            <a href="../main-user.html" class="text-2xl font-black tracking-tighter leading-none">CosechaDirecta</a>
            <p class="text-[10px] text-brand_lime font-bold uppercase tracking-widest mt-1.5 bg-white/5 py-1 px-2.5 rounded-md inline-block">Panel Agricultor</p>
        </div>

        <nav class="space-y-1.5 flex-1" id="navMenu">
            <button onclick="navigate('Dashboard')" data-target="Dashboard" class="nav-btn w-full flex justify-between items-center px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold">
                <span class="flex items-center gap-3">Dashboard</span>
            </button>
            <button onclick="navigate('MisProductos')" data-target="MisProductos" class="nav-btn w-full flex justify-between items-center px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold">
                <span class="flex items-center gap-3">Mis Productos</span>
            </button>
            <button onclick="navigate('Pedidos')" data-target="Pedidos" class="nav-btn w-full flex justify-between items-center px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold">
                <span class="flex items-center gap-3">Pedidos</span>
            </button>
            <button onclick="navigate('Viajes')" data-target="Viajes" class="nav-btn w-full flex justify-between items-center px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold">
                <span class="flex items-center gap-3">Mis Viajes</span>
            </button>
            <button onclick="navigate('Tokens')" data-target="Tokens" class="nav-btn w-full flex justify-between items-center px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold">
                <span class="flex items-center gap-3">Mis Tokens</span>
            </button>
            <button onclick="navigate('Contratos')" data-target="Contratos" class="nav-btn w-full flex justify-between items-center px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold">
                <span class="flex items-center gap-3">Contratos</span>
            </button>
            <button onclick="navigate('Financiamientos')" data-target="Financiamientos" class="nav-btn w-full flex justify-between items-center px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold">
                <span class="flex items-center gap-3">Financiamientos</span>
            </button>
            <button onclick="navigate('Perfil')" data-target="Perfil" class="nav-btn w-full flex justify-between items-center px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold">
                <span class="flex items-center gap-3">Perfil</span>
            </button>
        </nav>
    </div>

    <div class="border-t border-white/10 pt-4 mt-6">
        <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-3 px-4 py-3 hover:bg-red-500/10 text-red-400 rounded-2xl transition text-sm font-bold">
            Cerrar sesión
        </button>
    </div>
</aside>

<div class="flex-1 pl-72 flex flex-col min-h-screen pt-10">
    <main class="px-10 pb-10 flex-1 max-w-7xl w-full mx-auto">
        <div id="content" class="bg-white rounded-[32px] p-8 custom-shadow border border-gray-100 min-h-[500px]">
            </div>
    </main>
</div>

<div id="financingModal" class="fixed inset-0 bg-navy_dark/80 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4">
    <div class="bg-white p-8 rounded-[40px] w-full max-w-md custom-shadow scale-95 transition-transform">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-black text-xl">Solicitar Financiamiento</h3>
            <button onclick="cerrarFinancing()" class="text-3xl opacity-50 hover:opacity-100 hover:text-danger">&times;</button>
        </div>
        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-6 border-b border-gray-100 pb-4">Token Respaldo: <span id="finTokenCodigo" class="text-navy_dark font-bold text-sm bg-gray-50 px-2 py-1 rounded-lg ml-2"></span></p>

        <div class="space-y-5">
            <div class="bg-brand_lime/20 border border-brand_lime/40 p-4 rounded-2xl text-center">
                <label class="text-[10px] font-black text-navy_dark uppercase block mb-1">Valor estimado del activo</label>
                <p id="finValorEstimado" class="text-2xl font-black text-navy_dark"></p>
            </div>
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Monto a solicitar ($)</label>
                <input type="number" id="finMonto" min="1" class="w-full bg-gray-50 border border-gray-100 rounded-2xl py-3 px-4 focus:border-brand_lime outline-none font-bold text-navy_dark">
            </div>
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Plazo (días)</label>
                <input type="number" id="finPlazo" min="1" value="90" class="w-full bg-gray-50 border border-gray-100 rounded-2xl py-3 px-4 focus:border-brand_lime outline-none font-bold text-navy_dark">
            </div>
        </div>

        <div class="flex gap-3 mt-8">
            <button onclick="cerrarFinancing()" class="flex-1 py-4 font-bold text-gray-400 hover:text-navy_dark transition-all">Cancelar</button>
            <button onclick="confirmarFinancing()" class="flex-[2] bg-brand_lime text-navy_dark py-4 rounded-2xl font-black shadow-lg hover:bg-brand_lime_dark transition-all uppercase tracking-widest text-xs">Solicitar</button>
        </div>
    </div>
</div>

<div id="crearViajeModal" class="fixed inset-0 bg-navy_dark/80 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4">
    <div class="bg-white p-8 rounded-[40px] w-full max-w-lg custom-shadow scale-95 transition-transform max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-black text-xl">Publicar Nuevo Viaje</h3>
            <button onclick="cerrarCrearViaje()" class="text-3xl opacity-50 hover:opacity-100 hover:text-danger">&times;</button>
        </div>

        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Pedidos a incluir</p>
        <div id="crearViajePedidos" class="mb-6 space-y-2 bg-gray-50 p-4 rounded-2xl border border-gray-100 max-h-40 overflow-y-auto"></div>

        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Origen</label>
                    <input type="text" id="viajeOrigen" class="w-full bg-gray-50 border border-gray-100 rounded-2xl py-3 px-4 focus:border-brand_lime outline-none font-bold text-navy_dark" placeholder="Ej: Mérida">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Destino</label>
                    <input type="text" id="viajeDestino" class="w-full bg-gray-50 border border-gray-100 rounded-2xl py-3 px-4 focus:border-brand_lime outline-none font-bold text-navy_dark" placeholder="Ej: Caracas">
                </div>
            </div>
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Pago al Transportista ($)</label>
                <input type="number" id="viajePago" min="1" class="w-full bg-gray-50 border border-gray-100 rounded-2xl py-3 px-4 focus:border-brand_lime outline-none font-bold text-navy_dark">
            </div>
            
            <div class="bg-navy_dark text-brand_lime p-4 rounded-2xl text-center">
                <p id="viajeCargaTotal" class="text-sm font-black uppercase tracking-widest">Carga total: 0 kg</p>
            </div>
        </div>

        <div class="flex gap-3 mt-8">
            <button onclick="cerrarCrearViaje()" class="flex-1 py-4 font-bold text-gray-400 hover:text-navy_dark transition-all">Cancelar</button>
            <button onclick="confirmarCrearViaje()" class="flex-[2] bg-brand_lime text-navy_dark py-4 rounded-2xl font-black shadow-lg hover:bg-brand_lime_dark transition-all uppercase tracking-widest text-xs">Publicar Viaje</button>
        </div>
    </div>
</div>

<div id="agregarViajeModal" class="fixed inset-0 bg-navy_dark/80 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4">
    <div class="bg-white p-8 rounded-[40px] w-full max-w-md custom-shadow scale-95 transition-transform">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-black text-xl">Agregar pedido a viaje</h3>
            <button onclick="cerrarAgregarViaje()" class="text-3xl opacity-50 hover:opacity-100 hover:text-danger">&times;</button>
        </div>
        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Selecciona un viaje activo:</p>
        <div id="agregarViajeLista" class="space-y-2 max-h-60 overflow-y-auto pr-2"></div>
        <div class="flex justify-end mt-6 pt-4 border-t border-gray-100">
            <button onclick="cerrarAgregarViaje()" class="w-full py-4 bg-gray-100 text-gray-600 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-gray-200 transition-all">Cancelar</button>
        </div>
    </div>
</div>

<!-- MODAL ESTADO CONTRATO -->
<div id="contratoEstadoModal" class="fixed inset-0 bg-navy_dark/80 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4">
    <div class="bg-white p-8 rounded-[40px] w-full max-w-md custom-shadow scale-95 transition-transform">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-black text-xl">Actualizar estado del contrato</h3>
            <button onclick="cerrarModalEstadoContrato()" class="text-3xl opacity-50 hover:opacity-100 hover:text-danger">&times;</button>
        </div>
        <div class="space-y-5">
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Nuevo estado</label>
                <select id="contratoEstadoSelect" class="w-full bg-gray-50 border border-gray-100 rounded-2xl py-3 px-4 focus:border-brand_lime outline-none font-semibold"></select>
            </div>
        </div>
        <div class="flex gap-3 mt-8">
            <button onclick="cerrarModalEstadoContrato()" class="flex-1 py-4 font-bold text-gray-400 hover:text-navy_dark transition-all">Cancelar</button>
            <button onclick="confirmarEstadoContrato()" class="flex-[2] bg-brand_lime text-navy_dark py-4 rounded-2xl font-black shadow-lg hover:bg-brand_lime_dark transition-all uppercase tracking-widest text-xs">Confirmar</button>
        </div>
    </div>
</div>

<script>
const API_PRODUCTS = "http://localhost:3000/api/products";
const API_ORDERS = "http://localhost:3000/api/orders";
const API_TOKENS = "http://localhost:3000/api/tokens";
const API_FINANCING = "http://localhost:3000/api/financiamiento";
const API_CONTRACTS = "http://localhost:3000/api/contracts";
const API_TRIPS = "http://localhost:3000/api/trips";
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user") || "{}");

if (!token) window.location.href = "../login.html";

// ======================
// BADGES GLOBALES
// ======================
const badgeColorGlobal = (estado) => ({
    pendiente: "bg-yellow-100 text-yellow-700 border border-yellow-200",
    activo: "bg-blue-100 text-blue-700 border border-blue-200",
    asignado: "bg-blue-100 text-blue-700 border border-blue-200",
    aceptado: "bg-green-100 text-green-700 border border-green-200",
    aprobado: "bg-green-100 text-green-700 border border-green-200",
    pagado: "bg-blue-100 text-blue-700 border border-blue-200",
    en_produccion: "bg-indigo-100 text-indigo-700 border border-indigo-200",
    en_transporte: "bg-purple-100 text-purple-700 border border-purple-200",
    en_camino: "bg-purple-100 text-purple-700 border border-purple-200",
    carga_recogida: "bg-indigo-100 text-indigo-700 border border-indigo-200",
    "llegó_a_destino": "bg-brand_lime text-navy_dark shadow-sm",
    entregado: "bg-brand_lime text-navy_dark shadow-sm",
    finalizado: "bg-navy_dark text-brand_lime shadow-sm",
    rechazado: "bg-red-100 text-red-700 border border-red-200",
    cancelado: "bg-red-100 text-red-700 border border-red-200",
    Disponible: "bg-green-100 text-green-700 border border-green-200",
    Vendido: "bg-blue-100 text-blue-700 border border-blue-200",
    Transferido: "bg-yellow-100 text-yellow-700 border border-yellow-200",
    Dividido: "bg-purple-100 text-purple-700 border border-purple-200",
}[estado] || "bg-gray-100 text-gray-500 border border-gray-200");

const badgeLabelGlobal = (estado) => ({
    pendiente: "Pendiente",
    activo: "Activo",
    asignado: "Asignado",
    aceptado: "Aceptado",
    aprobado: "Aprobado",
    pagado: "Pagado",
    en_produccion: "En producción",
    en_transporte: "En transporte",
    en_camino: "En camino",
    carga_recogida: "Carga recogida",
    "llegó_a_destino": "En Destino",
    entregado: "Entregado",
    finalizado: "Finalizado",
    rechazado: "Rechazado",
    cancelado: "Cancelado",
    Disponible: "Disponible",
    Vendido: "Vendido",
    Transferido: "Transferido",
    Dividido: "Dividido"
}[estado] || estado);


// ======================
// NAVEGACIÓN
// ======================
const views = {
    Dashboard: renderDashboard,
    MisProductos: renderMisProductos,
    Pedidos: renderPedidos,
    Viajes: renderViajes,
    Tokens: renderTokens,
    Contratos: renderContratos,
    Financiamientos: renderFinanciamientos,
    Perfil: renderPerfil
};

function navigate(name) {
    const c = document.getElementById("content");
    c.innerHTML = '<div class="flex justify-center items-center h-64"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand_lime"></div></div>';

    // Estilos activos del Sidebar
    const buttons = document.querySelectorAll('.nav-btn');
    buttons.forEach(btn => {
        if(btn.dataset.target === name) {
            btn.className = "nav-btn w-full flex justify-between items-center px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] bg-brand_lime text-navy_dark font-black shadow-lg shadow-brand_lime/10";
        } else {
            btn.className = "nav-btn w-full flex justify-between items-center px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold";
        }
    });

    if (views[name]) views[name]();
}

// ======================
// DASHBOARD
// ======================
async function renderDashboard() {
    const c = document.getElementById("content");

    try {
        const [prods, peds, tokensArr, contr, vjs, fins] = await Promise.all([
            fetch(API_PRODUCTS + "/me", { headers: { Authorization: "Bearer " + token } }).then(r => r.json()),
            fetch(API_ORDERS + "/agricultor", { headers: { Authorization: "Bearer " + token } }).then(r => r.json()).catch(() => []),
            fetch(API_TOKENS + "/mis-tokens", { headers: { Authorization: "Bearer " + token } }).then(r => r.json()),
            fetch(API_CONTRACTS + "/agricultor", { headers: { Authorization: "Bearer " + token } }).then(r => r.json()),
            fetch(API_TRIPS + "/mis-pedidos", { headers: { Authorization: "Bearer " + token } }).then(r => r.json()),
            fetch(API_FINANCING, { headers: { Authorization: "Bearer " + token } }).then(r => r.json())
        ]);

        const len = (a) => (Array.isArray(a) ? a.length : 0);

        c.innerHTML = `
            <div class="mb-8 border-b border-gray-100 pb-6">
                <h2 class="text-2xl font-black mb-1">Centro de Operaciones</h2>
                <p class="text-sm text-gray-400 font-medium">Bienvenido de vuelta, <span class="font-bold text-navy_dark">${user.nombre || "Agricultor"}</span>.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-gray-50 border border-gray-100 p-6 rounded-[24px]">
                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-2">Productos</p>
                    <p class="text-4xl font-black text-navy_dark">${len(prods)}</p>
                </div>
                <div class="bg-brand_lime/20 border border-brand_lime/40 p-6 rounded-[24px]">
                    <p class="text-[10px] text-navy_dark font-black uppercase tracking-widest mb-2">Pedidos Activos</p>
                    <p class="text-4xl font-black text-navy_dark">${len(peds)}</p>
                </div>
                <div class="bg-navy_dark p-6 rounded-[24px]">
                    <p class="text-[10px] text-brand_lime font-black uppercase tracking-widest mb-2">Viajes en Curso</p>
                    <p class="text-4xl font-black text-white">${len(vjs)}</p>
                </div>
                <div class="bg-gray-50 border border-gray-100 p-6 rounded-[24px]">
                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-2">Tokens Emitidos</p>
                    <p class="text-4xl font-black text-navy_dark">${len(tokensArr)}</p>
                </div>
                <div class="bg-gray-50 border border-gray-100 p-6 rounded-[24px]">
                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-2">Contratos</p>
                    <p class="text-4xl font-black text-navy_dark">${len(contr)}</p>
                </div>
                <div class="bg-gray-50 border border-gray-100 p-6 rounded-[24px]">
                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-2">Financiamientos</p>
                    <p class="text-4xl font-black text-navy_dark">${len(fins)}</p>
                </div>
            </div>
        `;
    } catch (e) {
        c.innerHTML = "<p class='text-danger font-bold bg-red-50 p-4 rounded-2xl'>Error al cargar dashboard</p>";
    }
}

// ======================
// MIS PRODUCTOS
// ======================
function renderMisProductos() {
    const c = document.getElementById("content");
    c.innerHTML = `
        <div class="mb-8 border-b border-gray-100 pb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h2 class="text-2xl font-black mb-1">Mis Productos</h2>
                <p class="text-sm text-gray-400 font-medium">Gestiona tu inventario agrícola.</p>
            </div>
        </div>

        <div class="bg-gray-50 border border-gray-100 p-6 rounded-[24px] mb-8">
            <h3 class="font-black text-sm uppercase tracking-widest mb-4">Añadir Nuevo Lote</h3>
            <form id="productForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Nombre</label>
                    <input id="nombre" class="w-full bg-white border border-gray-100 rounded-2xl py-3 px-4 focus:border-brand_lime outline-none font-bold text-navy_dark" required>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Volumen (kg)</label>
                    <input id="cantidad" type="number" class="w-full bg-white border border-gray-100 rounded-2xl py-3 px-4 focus:border-brand_lime outline-none font-bold text-navy_dark" required>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Precio ($/kg)</label>
                    <input id="precioKg" type="number" step="0.01" class="w-full bg-white border border-gray-100 rounded-2xl py-3 px-4 focus:border-brand_lime outline-none font-bold text-navy_dark" required>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Ubicación</label>
                    <input id="ubicacion" class="w-full bg-white border border-gray-100 rounded-2xl py-3 px-4 focus:border-brand_lime outline-none font-bold text-navy_dark mb-4 md:mb-0" required>
                </div>
                <div class="md:col-span-4 mt-2">
                    <button class="w-full md:w-auto bg-navy_dark text-white px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-brand_lime hover:text-navy_dark shadow-lg transition-all">Guardar Producto</button>
                </div>
            </form>
        </div>
        
        <div id="productList">
            <div class="flex justify-center items-center h-32"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand_lime"></div></div>
        </div>
    `;
    loadProductList();
}

async function loadProductList() {
    const container = document.getElementById("productList");

    try {
        const res = await fetch(API_PRODUCTS + "/me", {
            headers: { Authorization: "Bearer " + token }
        });
        const data = await res.json();

        if (!data.length) {
            container.innerHTML = "<div class='bg-gray-50 rounded-[20px] p-8 text-center border border-dashed border-gray-200'><p class='text-gray-400 font-bold text-sm'>No has creado productos aún.</p></div>";
            return;
        }

        container.innerHTML = `
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50/50 border-b border-gray-100">
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Producto</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Volumen</th>

// Delegated submit para crear producto
document.getElementById("content").addEventListener("submit", async (e) => {
    if (e.target.id !== "productForm") return;
    e.preventDefault();

    const btn = e.target.querySelector('button');
    const ogText = btn.innerText;
    btn.innerText = "Guardando...";
    btn.disabled = true;

    const body = {
        nombre: document.getElementById("nombre").value,
        cantidad: document.getElementById("cantidad").value,
        precioKg: document.getElementById("precioKg").value,
        ubicacion: document.getElementById("ubicacion").value
    };

    const res = await fetch(API_PRODUCTS, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify(body)
    });

    const data = await res.json();
    if (!res.ok) { alert(data.message); btn.innerText = ogText; btn.disabled = false; return; }

    renderMisProductos();
});

let finTokenId = null;

    document.getElementById("finMonto").value = "";
    document.getElementById("finPlazo").value = "90";

async function confirmarFinancing() {
    const monto = parseInt(document.getElementById("finMonto").value);
    const plazoDias = parseInt(document.getElementById("finPlazo").value);

    if (!monto || !plazoDias) { alert("Completa todos los campos"); return; }

    const res = await fetch(API_FINANCING, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ tokenId: finTokenId, montoSolicitado: monto, plazoDias })
    });

    const data = await res.json();
    if (!res.ok) { alert(data.message); return; }

    alert("Solicitud de financiamiento enviada. Espera la aprobación.");
    cerrarFinancing();
    navigate("Tokens");
}

let contratoIdActual = null;

function abrirModalEstadoContrato(id, currentEstado) {
    contratoIdActual = id;
    const select = document.getElementById("contratoEstadoSelect");
    select.innerHTML = "";
    const order = ["activo","en_produccion","en_transporte","entregado","finalizado"];
    const idx = order.indexOf(currentEstado);
    if (idx === -1 || idx >= order.length - 1) { cerrarModalEstadoContrato(); return; }
    order.slice(idx + 1).forEach(e => {
        const opt = document.createElement("option");
        opt.value = e;
        opt.textContent = badgeLabelGlobal(e);
        select.appendChild(opt);
    });
    document.getElementById("contratoEstadoModal").classList.remove("hidden");
}

function mostrarCrearViaje() {
    document.getElementById("crearViajeModal").classList.remove("hidden");

    fetch(API_ORDERS + "/agricultor", {
        headers: { "Authorization": "Bearer " + token }
    })
    .then(r => r.json())
    .then(orders => {
        const aceptadosSinViaje = orders.filter(o => o.estado === "aceptado" && !o.viaje);
        const container = document.getElementById("crearViajePedidos");

        if (!aceptadosSinViaje.length) {
            container.innerHTML = "<p class='text-gray-400 font-bold text-sm text-center py-4'>No hay pedidos aceptados sin asignar.</p>";
            return;
        }

        container.innerHTML = aceptadosSinViaje.map(o => `
            <label class="flex items-center gap-3 bg-white p-3 rounded-xl border border-gray-100 cursor-pointer hover:border-brand_lime transition-all">
                <input type="checkbox" class="pedidoCheck w-4 h-4 accent-brand_lime" value="${o._id}" data-cantidad="${o.cantidad}" onchange="calcularCargaViaje()">
                <div class="flex-1 text-sm">
                    <span class="font-black text-navy_dark">${o.producto?.nombre || "—"}</span>
                    <span class="text-gray-400 mx-1">—</span>
                    <span class="font-bold text-gray-600">${o.cantidad} kg</span>
                </div>
            </label>
        `).join("");

function calcularCargaViaje() {
    const checks = document.querySelectorAll(".pedidoCheck:checked");
    let total = 0;
    checks.forEach(c => { total += parseFloat(c.dataset.cantidad || 0); });
    document.getElementById("viajeCargaTotal").innerText = "Carga total: " + total + " kg";
}

function cerrarCrearViaje() {
    document.getElementById("crearViajeModal").classList.add("hidden");
    document.getElementById("viajeOrigen").value = "";
    document.getElementById("viajeDestino").value = "";
    document.getElementById("viajePago").value = "";
    document.getElementById("viajeCargaTotal").innerText = "Carga total: 0 kg";
}

async function confirmarCrearViaje() {
    const checks = document.querySelectorAll(".pedidoCheck:checked");
    const pedidos = Array.from(checks).map(c => c.value);
    const origen = document.getElementById("viajeOrigen").value.trim();
    const destino = document.getElementById("viajeDestino").value.trim();
    const pago = parseInt(document.getElementById("viajePago").value);

    if (!pedidos.length || !origen || !destino || !pago) {
        alert("Completa todos los campos y selecciona al menos un pedido.");
        return;
    }

    const res = await fetch(API_TRIPS, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ pedidos, origen, destino, pago })
    });

    if (!res.ok) { const data = await res.json(); alert(data.message); return; }

    alert("Viaje publicado exitosamente.");
    cerrarCrearViaje();
    navigate("Viajes");
}

function agregarAPedidoViaje(pedidoId) {
    pedidoParaViajeId = pedidoId;

        container.innerHTML = disponibles.map(t => `

                ${t.pedidos.map(p => `<tr><td><b>${p.producto?.nombre || "—"}</b></td><td>${p.cantidad} kg</td><td>${p.comercio?.nombre || "—"}</td></tr>`).join("")}
            </table></div>` : ""}
            <div class="firma"><div><div class="line">Firma Despachador</div></div><div><div class="line">Firma Transportista</div></div></div>
        `);
    });
}
