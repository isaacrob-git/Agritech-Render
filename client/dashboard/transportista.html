<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Transportista | CosechaDirecta</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    brand_lime: '#D1F09B',
                    brand_lime_dark: '#B8E07D',
                    navy_dark: '#102A32',
                    navy_deep: '#0A1F26',
                    danger: '#EF4444'
                },
                fontFamily: { sans: ['Inter', 'sans-serif'] }
            }
        }
    }
</script>
<style>
    body { background-color: #F8FAFC; font-family: 'Inter', sans-serif; }
    .glass-sidebar { background: rgba(16, 42, 50, 0.98); backdrop-filter: blur(10px); }
    .custom-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
    
    /* Scrollbar minimalista para tablas */
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
</style>
</head>
<body class="text-navy_dark flex min-h-screen">

<!-- SIDEBAR -->
<aside class="w-72 glass-sidebar text-white p-6 flex flex-col justify-between fixed h-full z-40">
    <div>
        <div class="mb-10 px-2">
            <a href="../main-user.html" class="text-2xl font-black tracking-tighter leading-none">CosechaDirecta</a>
            <p class="text-[10px] text-brand_lime font-bold uppercase tracking-widest mt-1.5 bg-white/5 py-1 px-2.5 rounded-md inline-block">Panel Transportista</p>
        </div>

        <nav class="space-y-1.5 flex-1" id="navMenu">
            <button onclick="navigate('Dashboard')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold">
                Dashboard
            </button>
            <button onclick="navigate('Disponibles')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold">
                Viajes disponibles
            </button>
            <button onclick="navigate('MisViajes')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold">
                Mis viajes
            </button>
            <button onclick="navigate('Historial')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold">
                Historial
            </button>
            <button onclick="navigate('Perfil')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold">
                Perfil
            </button>
        </nav>
    </div>

    <div class="border-t border-white/10 pt-4 mt-6">
        <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-3 px-4 py-3 hover:bg-red-500/10 text-red-400 rounded-2xl transition text-sm font-bold">
            Cerrar sesión
        </button>
    </div>
</aside>

<!-- MAIN -->
<div class="flex-1 pl-72 flex flex-col min-h-screen">
    <main class="p-10 flex-1 max-w-7xl w-full">
        <div id="content" class="bg-white rounded-[32px] p-8 custom-shadow border border-gray-100 min-h-[500px]"></div>
    </main>
</div>

<!-- MODAL TRACKING -->
<div id="trackingModal" class="fixed inset-0 bg-navy_dark/80 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4">
    <div class="bg-white p-8 rounded-[40px] w-full max-w-md custom-shadow scale-95 transition-transform">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-black text-xl">Actualizar estado del viaje</h3>
            <button onclick="cerrarModalTracking()" class="text-3xl opacity-50 hover:opacity-100 hover:text-danger">&times;</button>
        </div>

        <div class="space-y-5">
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Nuevo estado</label>
                <select id="trackingEstado" class="w-full bg-gray-50 border border-gray-100 rounded-2xl py-3 px-4 focus:border-brand_lime outline-none font-semibold"></select>
            </div>
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Ubicación (opcional)</label>
                <input type="text" id="trackingUbicacion" class="w-full bg-gray-50 border border-gray-100 rounded-2xl py-3 px-4 focus:border-brand_lime outline-none" placeholder="Ej: Valencia, Carabobo">
            </div>
        </div>

        <div class="flex gap-3 mt-8">
            <button onclick="cerrarModalTracking()" class="flex-1 py-4 font-bold text-gray-400 hover:text-navy_dark transition-all">Cancelar</button>
            <button onclick="confirmarTracking()" class="flex-[2] bg-brand_lime text-navy_dark py-4 rounded-2xl font-black shadow-lg hover:bg-brand_lime_dark transition-all uppercase tracking-widest text-xs">Confirmar</button>
        </div>
    </div>
</div>

<script>
const API_TRIPS = "http://localhost:3000/api/trips";
const user = JSON.parse(localStorage.getItem("user") || "{}");
const token = localStorage.getItem("token");

if (!token) window.location.href = "../login.html";

// ======================
// NAVEGACIÓN Y ESTILOS ACTIVOS
// ======================
const views = {
    "Dashboard": renderDashboard,
    "Disponibles": renderDisponibles,
    "MisViajes": renderMisViajes,
    "Historial": renderHistorial,
    "Perfil": renderPerfil
};

function navigate(name) {
    document.getElementById("content").innerHTML = '<div class="flex justify-center items-center h-64"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand_lime"></div></div>';
    
    // Actualizar botones visualmente
    const buttons = document.querySelectorAll('.nav-btn');
    buttons.forEach(btn => {
        if(btn.innerText.trim().toLowerCase() === name.toLowerCase().replace('misviajes', 'mis viajes').replace('disponibles', 'viajes disponibles')) {
            btn.className = "nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] bg-brand_lime text-navy_dark font-black shadow-lg shadow-brand_lime/10";
        } else {
            btn.className = "nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm transition-all uppercase tracking-wider text-[11px] text-white/70 hover:bg-white/5 hover:text-white font-semibold";
        }
    });

    if (views[name]) views[name]();
}

// ======================
// BADGES (Estilos Modernizados)
// ======================
const estadoBadge = (e) => ({
    pendiente: "bg-yellow-100 text-yellow-700 border border-yellow-200",
    asignado: "bg-blue-100 text-blue-700 border border-blue-200",
    carga_recogida: "bg-indigo-100 text-indigo-700 border border-indigo-200",
    en_camino: "bg-purple-100 text-purple-700 border border-purple-200",
    "llegó_a_destino": "bg-brand_lime text-navy_dark shadow-sm",
    entregado: "bg-navy_dark text-brand_lime shadow-sm",
    cancelado: "bg-red-100 text-red-700 border border-red-200"
}[e] || "bg-gray-100 text-gray-500 border border-gray-200");

const estadoLabel = (e) => ({
    pendiente: "Pendiente",
    asignado: "Asignado",
    carga_recogida: "Carga recogida",
    en_camino: "En camino",
    "llegó_a_destino": "Llegó a destino",
    entregado: "Entregado",
    cancelado: "Cancelado"
}[e] || e);

// ======================
// DASHBOARD
// ======================
async function renderDashboard() {
    const c = document.getElementById("content");

    try {
        const [disp, mis] = await Promise.all([
            fetch(API_TRIPS + "/disponibles", { headers: { "Authorization": "Bearer " + token } }).then(r => r.json()),
            fetch(API_TRIPS + "/mis-viajes", { headers: { "Authorization": "Bearer " + token } }).then(r => r.json())
        ]);

        const disponible = Array.isArray(disp) ? disp.length : 0;
        const misViajes = Array.isArray(mis) ? mis : [];
        const enRuta = misViajes.filter(t => ["asignado","carga_recogida","en_camino","llegó_a_destino"].includes(t.estado)).length;
        const entregados = misViajes.filter(t => t.estado === "entregado").length;

        c.innerHTML = `
            <div class="mb-8 border-b border-gray-100 pb-6">
                <h2 class="text-2xl font-black mb-1">Resumen General</h2>
                <p class="text-sm text-gray-400 font-medium">Hola <span class="font-bold text-navy_dark">${user.nombre || "Transportista"}</span>, aquí tienes el estado de tu logística.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                <div class="bg-gray-50 border border-gray-100 p-6 rounded-[24px]">
                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-2">Viajes Disponibles</p>
                    <p class="text-4xl font-black text-navy_dark">${disponible}</p>
                </div>
                <div class="bg-gray-50 border border-gray-100 p-6 rounded-[24px]">
                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-2">Mis Viajes</p>
                    <p class="text-4xl font-black text-navy_dark">${misViajes.length}</p>
                </div>
                <div class="bg-brand_lime/20 border border-brand_lime/40 p-6 rounded-[24px]">
                    <p class="text-[10px] text-navy_dark font-black uppercase tracking-widest mb-2">En Ruta</p>
                    <p class="text-4xl font-black text-navy_dark">${enRuta}</p>
                </div>
                <div class="bg-navy_dark p-6 rounded-[24px]">
                    <p class="text-[10px] text-brand_lime font-black uppercase tracking-widest mb-2">Entregados</p>
                    <p class="text-4xl font-black text-white">${entregados}</p>
                </div>
            </div>

            ${misViajes.filter(t => t.estado !== "entregado" && t.estado !== "cancelado").length > 0 ? `
                <h3 class="text-lg font-black mb-4">Viajes activos</h3>
                <div class="space-y-3">
                ${misViajes.filter(t => t.estado === "asignado" || t.estado === "carga_recogida" || t.estado === "en_camino" || t.estado === "llegó_a_destino").map(t => `
                    <div class="bg-white border border-gray-100 p-5 rounded-[20px] flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:border-brand_lime transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center font-black text-xs ">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6"><path d="M3.375 4.5C2.339 4.5 1.5 5.34 1.5 6.375V13.5h12V6.375c0-1.036-.84-1.875-1.875-1.875h-8.25ZM13.5 15h-12v2.625c0 1.035.84 1.875 1.875 1.875h.375a3 3 0 1 1 6 0h3a.75.75 0 0 0 .75-.75V15Z" /><path d="M8.25 19.5a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0ZM15.75 6.75a.75.75 0 0 0-.75.75v11.25c0 .087.015.17.042.248a3 3 0 0 1 5.958.464c.853-.175 1.522-.935 1.464-1.883a18.659 18.659 0 0 0-3.732-10.104 1.837 1.837 0 0 0-1.47-.725H15.75Z" /><path d="M19.5 19.5a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0Z" /></svg>
                            </div>
                            <div>
                                <p class="font-bold text-sm text-navy_dark mb-1"><span class="text-brand_lime bg-navy_dark px-2 py-0.5 rounded-md text-[10px] mr-2">${t.codigo}</span> ${t.origen} <span class="text-gray-300 mx-1">&rarr;</span> ${t.destino}</p>
                                <p class="text-xs text-gray-500 font-medium">Carga: <span class="font-bold">${t.cargaTotalKg} kg</span> <span class="mx-2">•</span> Pago: <span class="font-bold text-navy_dark">$${t.pago}</span></p>
                            </div>
                        </div>
                        <span class="px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-wide ${estadoBadge(t.estado)}">${estadoLabel(t.estado)}</span>
                    </div>
                `).join("")}
                </div>
            ` : `<div class="bg-gray-50 rounded-[20px] p-8 text-center border border-dashed border-gray-200"><p class='text-gray-400 font-bold text-sm'>No tienes viajes activos en este momento.</p></div>`}
        `;
    } catch (e) {
        c.innerHTML = "<p class='text-danger font-bold bg-red-50 p-4 rounded-2xl'>Error al cargar dashboard</p>";
    }
}

// ======================
// VIAJES DISPONIBLES
// ======================
async function renderDisponibles() {
    const c = document.getElementById("content");

    try {
        const res = await fetch(API_TRIPS + "/disponibles", {
            headers: { "Authorization": "Bearer " + token }
        });
        const data = await res.json();

        c.innerHTML = `
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black">Viajes Disponibles</h2>
            </div>
            ${!data.length ? "<div class='bg-gray-50 rounded-[20px] p-8 text-center border border-dashed border-gray-200'><p class='text-gray-400 font-bold text-sm'>No hay viajes disponibles para tomar.</p></div>" : `
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50/50 border-b border-gray-100">
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Viaje</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Ruta</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Carga</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Pago</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Agricultor</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest text-right">Acción</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        ${data.map(t => `
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-6 py-4 font-black text-sm text-navy_dark">${t.codigo}</td>
                                <td class="px-6 py-4 text-sm font-medium"><span class="text-gray-500">${t.origen}</span> &rarr; <span class="font-bold text-navy_dark">${t.destino}</span></td>
                                <td class="px-6 py-4 text-sm font-bold text-gray-600">${t.cargaTotalKg} kg</td>
                                <td class="px-6 py-4 text-sm font-black text-navy_dark">$${t.pago}</td>
                                <td class="px-6 py-4 text-xs font-bold text-gray-500">${t.agricultor?.nombre || "—"}</td>
                                <td class="px-6 py-4 text-right">
                                    <button onclick="asignarViaje('${t._id}')"
                                        class="bg-navy_dark text-brand_lime px-4 py-2 rounded-xl text-xs font-black uppercase tracking-wider hover:bg-brand_lime hover:text-navy_dark transition-all shadow-md shadow-navy_dark/10">
                                        Aceptar Viaje
                                    </button>
                                </td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            </div>
            `}
        `;
    } catch (e) {
        c.innerHTML = "<p class='text-danger font-bold bg-red-50 p-4 rounded-2xl'>Error al cargar viajes</p>";
    }
}

async function asignarViaje(id) {
    if (!confirm("¿Aceptar este viaje?")) return;

    const res = await fetch(API_TRIPS + "/" + id + "/asignar", {
        method: "PUT",
        headers: { "Authorization": "Bearer " + token }
    });

    if (!res.ok) {
        const data = await res.json();
        alert(data.message);
        return;
    }

    alert("Viaje asignado correctamente");
    navigate("MisViajes");
}

// ======================
// MIS VIAJES
// ======================
let viajeDetalleId = null;

const ordenEstados = ["asignado", "carga_recogida", "en_camino", "llegó_a_destino", "entregado"];

async function renderMisViajes() {
    const c = document.getElementById("content");

    if (viajeDetalleId) {
        renderDetalleViaje(viajeDetalleId);
        return;
    }

    try {
        const res = await fetch(API_TRIPS + "/mis-viajes", {
            headers: { "Authorization": "Bearer " + token }
        });
        const data = await res.json();

        c.innerHTML = `
            <div class="mb-6">
                <h2 class="text-2xl font-black">Mis Viajes Asignados</h2>
            </div>
            ${!data.length ? "<div class='bg-gray-50 rounded-[20px] p-8 text-center border border-dashed border-gray-200'><p class='text-gray-400 font-bold text-sm'>No tienes viajes asignados en este momento.</p></div>" : `
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50/50 border-b border-gray-100">
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Viaje</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Ruta</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Carga & Pago</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Estado</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest text-right">Opciones</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        ${data.map(t => `
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-6 py-4 font-black text-sm text-navy_dark">${t.codigo}</td>
                                <td class="px-6 py-4 text-sm font-medium"><span class="text-gray-500">${t.origen}</span> &rarr; <span class="font-bold text-navy_dark">${t.destino}</span></td>
                                <td class="px-6 py-4 text-sm font-medium">
                                    <span class="font-bold text-gray-600">${t.cargaTotalKg} kg</span><br>
                                    <span class="text-xs font-black text-navy_dark">$${t.pago}</span>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-wide ${estadoBadge(t.estado)}">
                                        ${estadoLabel(t.estado)}
                                    </span>
                                </td>
                                <td class="px-6 py-4 text-right space-x-1">
                                    <button onclick="viajeDetalleId='${t._id}'; renderMisViajes();"
                                        class="bg-gray-100 text-navy_dark px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-gray-200 transition-all">
                                        Ver
                                    </button>
                                    ${["asignado","carga_recogida","en_camino","llegó_a_destino"].includes(t.estado) ? `
                                        <button onclick="mostrarModalTracking('${t._id}')"
                                            class="bg-navy_dark text-brand_lime px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-navy_deep transition-all">
                                            Track
                                        </button>
                                    ` : ""}
                                </td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            </div>
            `}
        `;
    } catch (e) {
        c.innerHTML = "<p class='text-danger font-bold bg-red-50 p-4 rounded-2xl'>Error al cargar viajes</p>";
    }
}

// ======================
// DETALLE VIAJE
// ======================
async function renderDetalleViaje(id) {
    const c = document.getElementById("content");

    try {
        const res = await fetch(API_TRIPS + "/" + id, {
            headers: { "Authorization": "Bearer " + token }
        });
        const t = await res.json();

        c.innerHTML = `
            <button onclick="viajeDetalleId=null; renderMisViajes();" class="text-sm font-black text-gray-400 hover:text-navy_dark transition-colors mb-6 flex items-center gap-2 uppercase tracking-widest">
                &larr; Volver
            </button>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div>
                    <div class="flex items-center gap-4 mb-6">
                        <h2 class="text-3xl font-black">${t.codigo}</h2>
                        <span class="px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-wide ${estadoBadge(t.estado)}">
                            ${estadoLabel(t.estado)}
                        </span>
                    </div>

                    <div class="bg-gray-50 border border-gray-100 p-6 rounded-[24px] space-y-4 mb-8">
                        <div class="grid grid-cols-2 gap-4">
                            <div><p class="text-[10px] font-black text-gray-400 uppercase">Origen</p><p class="font-bold text-sm">${t.origen}</p></div>
                            <div><p class="text-[10px] font-black text-gray-400 uppercase">Destino</p><p class="font-bold text-sm">${t.destino}</p></div>
                            <div><p class="text-[10px] font-black text-gray-400 uppercase">Carga Total</p><p class="font-bold text-sm">${t.cargaTotalKg} kg</p></div>
                            <div><p class="text-[10px] font-black text-gray-400 uppercase">Pago Acordado</p><p class="font-black text-sm text-navy_dark">$${t.pago}</p></div>
                            <div class="col-span-2 pt-2 border-t border-gray-200"><p class="text-[10px] font-black text-gray-400 uppercase">Agricultor</p><p class="font-bold text-sm">${t.agricultor?.nombre || "—"}</p></div>
                        </div>
                    </div>

                    <h3 class="text-lg font-black mb-4 uppercase tracking-widest text-navy_dark">Pedidos del viaje</h3>
                    <div class="space-y-3">
                        ${(t.pedidos || []).map(p => `
                            <div class="bg-white border border-gray-100 p-4 rounded-2xl flex justify-between items-center custom-shadow">
                                <div>
                                    <p class="font-black text-sm text-navy_dark">${p.producto?.nombre || "Producto"}</p>
                                    <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase">Comercio: ${p.comercio?.nombre || "—"}</p>
                                </div>
                                <div class="bg-brand_lime/30 px-3 py-1 rounded-lg">
                                    <p class="font-black text-sm text-navy_dark">${p.cantidad} kg</p>
                                </div>
                            </div>
                        `).join("") || "<p class='text-sm font-bold text-gray-400'>Sin pedidos asociados</p>"}
                    </div>
                </div>

                <div>

function renderTimeline(t) {
    const steps = [
        { key: "pendiente", label: "Viaje publicado" },
        { key: "asignado", label: "Transportista asignado" },
        { key: "carga_recogida", label: "Mercancía recogida" },
        { key: "en_camino", label: "En carretera" },
        { key: "llegó_a_destino", label: "Llegó al destino" },
        { key: "entregado", label: "Entregado" }
    ];

    const estadosCompletados = (t.tracking || []).map(x => x.estado);

    return steps.map((s, i) => {
        const completado = estadosCompletados.includes(s.key);
        const entry = (t.tracking || []).find(x => x.estado === s.key);
        
        const circleClass = completado ? "bg-brand_lime text-navy_dark" : "bg-white/10 text-white/30 border border-white/20";
        const lineClass = completado ? "bg-brand_lime" : "bg-white/10";
        const textClass = completado ? "text-white" : "text-white/40";

        return `
            <div class="flex items-start mb-4 last:mb-0">
                <div class="flex flex-col items-center mr-4">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-black ${circleClass} transition-colors z-10">
                        ${completado ? "✓" : ""}
                    </div>
                    ${i < steps.length - 1 ? `
                        <div class="w-0.5 h-10 ${lineClass} -mt-2 -mb-2 z-0"></div>
                    ` : ""}
                </div>
                <div class="pt-1.5 pb-2">
                    <p class="font-bold text-sm ${textClass}">${s.label}</p>
                    ${entry ? `
                        <p class="text-[10px] text-brand_lime font-bold uppercase tracking-wider mt-1">
                            ${new Date(entry.fecha).toLocaleString()}
                            ${entry.ubicacion ? `<br><span class="text-white/60">📍 ${entry.ubicacion}</span>` : ""}
                        </p>
                    ` : ""}
                </div>
            </div>
        `;
    }).join("");
}

// ======================
// MODAL TRACKING
// ======================
let trackingTripId = null;

function mostrarModalTracking(tripId) {
    trackingTripId = tripId;

    document.getElementById("trackingModal").classList.remove("hidden");

    fetch(API_TRIPS + "/" + tripId, {
        headers: { "Authorization": "Bearer " + token }
    })
    .then(r => r.json())
    .then(t => {
        const idx = ordenEstados.indexOf(t.estado);
        const opciones = ordenEstados.slice(idx + 1);

        const select = document.getElementById("trackingEstado");
        select.innerHTML = opciones.map(e =>
            `<option value="${e}">${estadoLabel(e)}</option>`
        ).join("");
    });
}

function cerrarModalTracking() {
    document.getElementById("trackingModal").classList.add("hidden");
    trackingTripId = null;
}

async function confirmarTracking() {
    const estado = document.getElementById("trackingEstado").value;
    const ubicacion = document.getElementById("trackingUbicacion").value;

    if (!estado) {
        alert("Selecciona un estado");
        return;
    }

    const res = await fetch(API_TRIPS + "/" + trackingTripId + "/estado", {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ estado, ubicacion })
    });

    if (!res.ok) {
        const data = await res.json();
        alert(data.message);
        return;
    }

    cerrarModalTracking();
    viajeDetalleId = trackingTripId;
    renderMisViajes();
}

function printDocument(titulo, bodyHtml) {
    const userData = JSON.parse(localStorage.getItem("user") || "{}");
    const now = new Date().toLocaleString();

    const css = `
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', Arial, sans-serif; color: #102A32; padding: 40px; }
        .header { text-align: center; border-bottom: 3px solid #102A32; padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { color: #102A32; font-size: 28px; font-weight: 900; }
        .header p { color: #666; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;}
        .doc-title { font-size: 18px; font-weight: 900; text-align: center; margin-bottom: 25px; color: #102A32; text-transform: uppercase; }
        .section { margin-bottom: 25px; }
        .section-title { font-weight: 900; font-size: 12px; color: #102A32; border-bottom: 2px solid #D1F09B; padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;}
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        td, th { padding: 10px 12px; text-align: left; font-size: 12px; border-bottom: 1px solid #eee;}
        th { background: #f8fafc; color: #102A32; font-weight: 900; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        .row-label { font-weight: 900; color: #666; width: 140px; }
        .total-row td { font-weight: 900; font-size: 14px; border-top: 2px solid #102A32; }
        .firma { margin-top: 60px; display: flex; justify-content: center; }
        .firma div { text-align: center; width: 200px; }
        .firma .line { border-top: 2px solid #102A32; margin-top: 40px; padding-top: 5px; font-size: 11px; font-weight: 900; text-transform: uppercase; }
        .footer { margin-top: 40px; text-align: center; font-size: 10px; color: #999; border-top: 1px solid #eee; padding-top: 15px; font-weight: 600;}
    </style>`;

    const win = window.open("", "_blank");
    win.document.write(`
        <!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><title>${titulo}</title>${css}</head>
        <body>
            <div class="header">
                <h1>CosechaDirecta</h1>
                <p>Plataforma de Comercio Agrícola</p>
            </div>
            <div class="doc-title">${titulo}</div>
            ${bodyHtml}
            <div class="footer">
                <p>Documento generado el ${now} por ${userData.nombre || "—"} (${userData.codigo || "—"})</p>
                <p>CosechaDirecta &copy; ${new Date().getFullYear()}</p>
            </div>
        </body>
        </html>
    `);
    win.document.close();

    setTimeout(() => {
        win.focus();
        win.print();
    }, 300);
}

function imprimirComprobanteViaje(tripId) {
    fetch(API_TRIPS + "/" + tripId, {
        headers: { "Authorization": "Bearer " + token }
    })
    .then(r => r.json())
    .then(t => {
        const userData = JSON.parse(localStorage.getItem("user") || "{}");
        const badgeBg = t.estado === "entregado" ? "#102A32"
            : t.estado === "cancelado" ? "#EF4444"
            : t.estado === "pendiente" ? "#eab308"
            : t.estado === "asignado" ? "#3b82f6"
            : "#D1F09B";
        const badgeText = t.estado === "llegó_a_destino" ? "#102A32" : "#fff";

        const body = `
            <div class="section">
                <table>
                    <tr><td class="row-label">No. Comprobante:</td><td><b>${t.codigo}</b></td></tr>
                    <tr><td class="row-label">Fecha:</td><td>${new Date(t.createdAt || t._id?.getTimestamp?.()).toLocaleDateString() || new Date().toLocaleDateString()}</td></tr>
                    <tr><td class="row-label">Estado:</td><td><span style="background:${badgeBg};color:${badgeText};padding:4px 10px;border-radius:6px;font-size:10px;font-weight:900;text-transform:uppercase;">${t.estado}</span></td></tr>
                </table>
            </div>

            <div class="section">
                <div class="section-title">Participantes</div>
                <table>
                    <tr><td class="row-label">Transportista:</td><td>${userData.nombre || "—"} (${userData.codigo || "—"})</td></tr>
                    <tr><td class="row-label">Cliente:</td><td>${t.agricultor?.nombre || "—"}</td></tr>
                </table>
            </div>

            <div class="section">
                <div class="section-title">Ruta y Carga</div>
                <table>
                    <tr><td class="row-label">Origen:</td><td>${t.origen || "—"}</td></tr>
                    <tr><td class="row-label">Destino:</td><td>${t.destino || "—"}</td></tr>
                    <tr><td class="row-label">Carga total:</td><td>${t.cargaTotalKg} kg</td></tr>
                    <tr class="total-row"><td>Pago acordado:</td><td>$${t.pago}</td></tr>
                </table>
            </div>

            ${t.pedidos?.length ? `
            <div class="section">
                <div class="section-title">Pedidos Transportados</div>
                <table>
                    <tr><th>Producto</th><th>Cantidad</th><th>Comercio</th></tr>
                    ${t.pedidos.map(p => `
                        <tr>
                            <td><b>${p.producto?.nombre || "—"}</b></td>
                            <td>${p.cantidad} kg</td>
                            <td>${p.comercio?.nombre || "—"}</td>
                        </tr>
                    `).join("")}
                </table>
            </div>` : ""}

            ${t.tracking?.length ? `
            <div class="section">
                <div class="section-title">Registro de Tracking</div>
                <table>
                    <tr><th>Fecha</th><th>Estado</th><th>Ubicación</th></tr>
                    ${t.tracking.map(x => `
                        <tr>
                            <td>${new Date(x.fecha).toLocaleString()}</td>
                            <td><b>${x.estado}</b></td>
                            <td>${x.ubicacion || "—"}</td>
                        </tr>
                    `).join("")}
                </table>
            </div>` : ""}

            <div class="firma">
                <div><div class="line">Firma Transportista</div></div>
            </div>
        `;

        printDocument("Comprobante de Viaje — Servicio de Transporte", body);
    });
}
