<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | CosechaDirecta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand_lime: '#D1F09B',
                        navy_dark: '#102A32',
                        navy_deep: '#0A1F26',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #102A32, #0A1F26);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #D1F09B;
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-[450px]">
    <a href="index.html" class="text-white/50 hover:text-brand_lime transition mb-8 inline-block flex items-center gap-2 text-sm">
        Volver a la página principal
    </a>

    <div class="glass-card rounded-[32px] p-8 md:p-10 shadow-2xl border border-white/10">
        <div class="flex items-center gap-2 mb-8 justify-center">
            <div class="w-6 h-6 bg-brand_lime rounded-sm"></div>
            <span class="text-white font-bold text-xl tracking-tighter">CosechaDirecta</span>
        </div>

        <h2 class="text-white text-2xl font-bold mb-2">Crea tu cuenta</h2>
        <p class="text-white/60 mb-8 text-sm">Únete a la plataforma de CosechaDirecta.</p>

        <form id="formRegister" class="space-y-4">
            <div>
                <div>
                    <label class="text-white/80 text-xs font-semibold mb-1 block">Nombre</label>
                    <input type="text" name="name" class="input-field w-full p-3 rounded-xl text-white text-sm" required>
                </div>
            </div>
            <div>
                <label class="text-white/80 text-xs font-semibold mb-1 block">Correo Electrónico</label>
                <input type="email" name="email" class="input-field w-full p-3 rounded-xl text-white text-sm" required>
            </div>
            <div>
    <label class="text-white/80 text-xs font-semibold mb-1 block">Contraseña</label>
    <div class="relative">
        <input type="password" name="password" id="registerPassword" 
            class="input-field w-full p-3 rounded-xl text-white text-sm pr-10" required>
        
        <button type="button" onclick="toggleRegisterPassword()" 
            class="absolute right-3 top-1/2 -translate-y-1/2 text-white/40 hover:text-brand_lime transition-colors">
            <svg id="regEyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                <path id="regEyePath" stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
        </button>
    </div>
</div>

            <div class="md:col-span-2">
                <label class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] mb-2 block ml-1">
                    Tipo / Rol
                </label>
                
                <div class="relative" id="customSelect">
                    <button type="button" onclick="toggleDropdown()" 
                        class="w-full bg-navy_dark border-2 border-transparent rounded-2xl py-4 px-6 flex justify-between items-center transition-all duration-300 hover:border-brand_lime hover:shadow-[0_0_15px_rgba(209,240,155,0.2)]">
                        <span id="selectedOption" class="font-black text-sm text-white uppercase tracking-wider">Usuario</span>
                        <span id="dropdownArrow" class="text-brand_lime transition-transform duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </span>
                    </button>

                    <div id="dropdownList" class="hidden absolute w-full mt-2 bg-navy_dark border-2 border-brand_lime/20 rounded-2xl overflow-hidden z-[100] shadow-2xl">
                        <div onclick="selectOption('comercio')" 
                            class="px-6 py-4 text-white font-bold text-sm cursor-pointer transition-colors hover:bg-brand_lime hover:text-navy_dark">
                            Comercio
                        </div>
                        <div onclick="selectOption('agricultor')" 
                            class="px-6 py-4 text-white font-bold text-sm cursor-pointer transition-colors hover:bg-brand_lime hover:text-navy_dark">
                            Agricultor
                        </div>
                        <div onclick="selectOption('transportista')" 
                            class="px-6 py-4 text-white font-bold text-sm cursor-pointer transition-colors hover:bg-brand_lime hover:text-navy_dark">
                            Transportista
                        </div>
                    </div>

                    <input type="hidden" name="role" id="roleInput" value="comercio">
                </div>
            </div>

            <button type="submit" class="w-full bg-brand_lime text-navy_dark font-bold py-4 rounded-xl hover:scale-[1.02] transition-transform shadow-lg shadow-brand_lime/10 mt-4">
                Crear Cuenta
            </button>
        </form>

        <p class="text-white/60 mt-8 text-center text-sm">
            ¿Ya tienes cuenta? 
            <a href="login.html" class="text-brand_lime font-bold hover:underline">Inicia Sesión</a>
        </p>
    </div>
</div>

<script>
document.getElementById('formRegister').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const name = form.name.value.trim();
    const email = form.email.value.trim();
    const password = form.password.value.trim();
    const role = form.role.value; // ✅ Capturamos el rol seleccionado

    try {
        const res = await fetch('http://localhost:3000/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombre: name, email, password, rol: role })
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.message || 'Error al registrar');
            return;
        }

        alert('Registro exitoso. Ahora inicia sesión.');
        window.location.href = 'login.html';

    } catch (err) {
        console.error(err);
        alert('Error de conexión con el servidor');
    }
});

function toggleDropdown() {
    const list = document.getElementById('dropdownList');
    const arrow = document.getElementById('dropdownArrow');
    list.classList.toggle('hidden');
    arrow.classList.toggle('rotate-180');
}

function selectOption(value) {
    const labels = { comercio: 'Comercio', agricultor: 'Agricultor', transportista: 'Transportista' };
    document.getElementById('selectedOption').innerText = labels[value] || value;
    document.getElementById('roleInput').value = value;
    toggleDropdown();
}

// Cerrar dropdown si se hace click fuera
window.addEventListener('click', function(e) {
    if (!document.getElementById('customSelect').contains(e.target)) {
        document.getElementById('dropdownList').classList.add('hidden');
        document.getElementById('dropdownArrow').classList.remove('rotate-180');
    }
});

function toggleRegisterPassword() {
    const passInput = document.getElementById('registerPassword');
    const eyePath = document.getElementById('regEyePath');
    
    const eyeOpen = "M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z";
    const eyeClosed = "M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88";

    if (passInput.type === 'password') {
        passInput.type = 'text';
        eyePath.setAttribute('d', eyeOpen);
    } else {
        passInput.type = 'password';
        eyePath.setAttribute('d', eyeClosed);
    }
}
</script>
</body>
</html>
